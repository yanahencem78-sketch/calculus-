<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Calculator with Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .calculator-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            color: #34495e;
        }
        select, input, button {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            margin-top: 15px;
            padding: 12px;
            background-color: #eef2f3;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            font-size: 14px;
        }
        .graph-container {
            margin-top: 20px;
            position: relative;
            height: 250px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Integration Calculator</h2>
    
    <label for="functionSelect">Select Function Type:</label>
    <select id="functionSelect">
        <option value="quadratic">f(x) = x² - 3x + 2</option>
        <option value="linear">f(x) = 2x + 3</option>
        <option value="cubic">f(x) = x³ - 2x</option>
    </select>

    <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label for="limitA">Lower Limit (a):</label>
            <input type="number" id="limitA" value="3">
        </div>
        <div style="flex: 1;">
            <label for="limitB">Upper Limit (b):</label>
            <input type="number" id="limitB" value="5">
        </div>
    </div>

    <button onclick="performIntegration()">Calculate Area & Plot Graph</button>

    <div id="result" class="result-box" style="display: none;"></div>

    <div class="graph-container">
        <canvas id="integrationChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    function f(x, type) {
        if (type === 'quadratic') return x*x - 3*x + 2;
        if (type === 'linear') return 2*x + 3;
        if (type === 'cubic') return x*x*x - 2*x;
        return 0;
    }

    function getAntiderivativeString(type) {
        if (type === 'quadratic') return "F(x) = (x³ / 3) - (1.5x²) + 2x";
        if (type === 'linear') return "F(x) = x² + 3x";
        if (type === 'cubic') return "F(x) = (x⁴ / 4) - x²";
        return "";
    }

    function getAntiderivativeValue(x, type) {
        if (type === 'quadratic') return (Math.pow(x, 3) / 3) - (1.5 * x * x) + (2 * x);
        if (type === 'linear') return (x * x) + (3 * x);
        if (type === 'cubic') return (Math.pow(x, 4) / 4) - (x * x);
        return 0;
    }

    function performIntegration() {
        const type = document.getElementById('functionSelect').value;
        const a = parseFloat(document.getElementById('limitA').value);
        const b = parseFloat(document.getElementById('limitB').value);

        if (isNaN(a) || isNaN(b)) {
            alert("Please enter valid numbers for limits.");
            return;
        }

        // Calculate calculus definite integral steps
        const F_b = getAntiderivativeValue(b, type);
        const F_a = getAntiderivativeValue(a, type);
        const areaValue = F_b - F_a;

        // Display results
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <strong>Integration Execution Steps:</strong><br><br>
            1. Antiderivative: <br><code>${getAntiderivativeString(type)}</code><br><br>
            2. Substitute Limits: <br>
            F(${b}) = ${F_b.toFixed(3)}<br>
            F(${a}) = ${F_a.toFixed(3)}<br><br>
            3. Net Area Calculation:<br>
            Area = F(b) - F(a) = <strong>${areaValue.toFixed(3)}</strong>
        `;

        // Render graph plot
        plotGraph(a, b, type);
    }

    function plotGraph(a, b, type) {
        const xValues = [];
        const yValues = [];
        const shadedAreaValues = [];

        // Set wider view padding context around input limits
        const startPoint = Math.min(a, b) - 2;
        const endPoint = Math.max(a, b) + 2;
        const increments = 50;
        const stepSize = (endPoint - startPoint) / increments;

        for (let i = 0; i <= increments; i++) {
            let currentX = startPoint + (i * stepSize);
            xValues.push(parseFloat(currentX.toFixed(2)));
            
            let currentY = f(currentX, type);
            yValues.push(currentY);

            // Shading window strictly inside limits a and b
            if (currentX >= Math.min(a,b) && currentX <= Math.max(a,b)) {
                shadedAreaValues.push(currentY);
            } else {
                shadedAreaValues.push(null);
            }
        }

        if (myChart) {
            myChart.destroy(); // Clear out old plot instance before painting fresh coordinates
        }

        const ctx = document.getElementById('integrationChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: xValues,
                datasets: [
                    {
                        label: 'f(x) curve',
                        data: yValues,
                        borderColor: '#2c3e50',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Shaded Area',
                        data: shadedAreaValues,
                        backgroundColor: 'rgba(52, 152, 219, 0.35)',
                        fill: 'origin',
                        pointRadius: 0,
                        borderColor: 'transparent'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', title: { display: true, text: 'x' } },
                    y: { title: { display: true, text: 'y' } }
                }
            }
        });
    }

    // Auto load setup on startup
    window.onload = function() {
        performIntegration();
    };
</script>

</body>
</html>
